wake_word_set_sensitivity:
  name: Wake word set sensitivity
  description: Set wake word sensitivity (0.0 to 1.0).
  target:
    entity:
      integration: esp32_aibox_media_controller
      domain: media_player
  fields:
    sensitivity:
      required: true
      selector:
        number:
          min: 0
          max: 1
          step: 0.01
          mode: slider

wake_word_get_sensitivity:
  name: Wake word get sensitivity
  description: Query wake word sensitivity.
  target:
