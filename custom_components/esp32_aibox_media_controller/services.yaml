stereo_set_channel:
  name: Set stereo channel
  description: Set stereo channel (left or right).
  target:
    entity:
      integration: esp32_aibox_media_controller
      domain: media_player
  fields:
    channel:
      required: true
      selector:
        select:
          options:
            - left
            - right

stereo_get_state:
  name: Get stereo state
