stereo_enable_receiver:
  name: Stereo enable receiver
  description: Enable stereo receiver/slave mode.
  target:
    entity:
      integration: esp32_aibox_media_controller
      domain: media_player

stereo_disable_receiver:
  name: Stereo disable receiver
  description: Disable stereo receiver/slave mode.
  target:
    entity:
      integration: esp32_aibox_media_controller
      domain: media_player

stereo_set_sync_delay:
  name: Stereo set sync delay
  description: Set stereo synchronization delay in milliseconds.
  target:
    entity:
      integration: esp32_aibox_media_controller
      domain: media_player
  fields:
    sync_delay_ms:
      required: true
      selector:
        number:
          min: 0
          mode: box
