send_keycode:
  name: Send keycode
  description: Send Android key event to ESP32 AIBox.
  target:
    entity:
      integration: esp32_aibox_media_controller
      domain: media_player
  fields:
    keycode:
      required: true
      selector:
        number:
          min: 1
          max: 300
          mode: box

run_command:
  name: Run command
  description: Run shell command on ESP32 AIBox.
  target:
    entity:
      integration: esp32_aibox_media_controller
      domain: media_player
  fields:
    command:
      required: true
      selector:
        text:
    type_id:
      required: false
      default: myshell
      selector:
        text:

send_message:
  name: Send message
  description: Send native ws send_message payload.
  target:
    entity:
      integration: esp32_aibox_media_controller
      domain: media_player
  fields:
    what:
      required: true
      selector:
        number:
          mode: box
    arg1:
      required: true
      selector:
        number:
          mode: box
    arg2:
      required: false
      default: -1
      selector:
        number:
          mode: box
    obj:
      required: false
      default: true
      selector:
        text:
    type_id:
      required: false
      selector:
        text:

ws_send_payload:
  name: WS send payload
  description: Send custom ws payload (JSON object string).
  target:
    entity:
      integration: esp32_aibox_media_controller
      domain: media_player
  fields:
    payload:
      required: true
      example: '{"type":"get_info"}'
      selector:
        text:
    expect_type:
      required: false
      selector:
        text:

search_youtube:
  name: Search YouTube
  description: Search songs on YouTube (AiboxPlus WebSocket port, default 8082).
  target:
    entity:
      integration: esp32_aibox_media_controller
      domain: media_player
  fields:
    query:
      required: true
      example: Son Tung M-TP
      selector:
        text:

search_playlist:
  name: Search YouTube playlist
  description: Search playlists on YouTube (AiboxPlus WebSocket port, default 8082).
  target:
    entity:
      integration: esp32_aibox_media_controller
      domain: media_player
  fields:
    query:
      required: true
      example: Nhac chill
      selector:
        text:

search_zing:
  name: Search Zing MP3
  description: Search songs on Zing MP3 (AiboxPlus WebSocket port, default 8082).
  target:
    entity:
      integration: esp32_aibox_media_controller
      domain: media_player
  fields:
    query:
      required: true
      example: See Tinh
      selector:
        text:

play_youtube:
  name: Play YouTube by video id
  description: Play a YouTube item by video id (for example from last_music_search.items).
  target:
    entity:
      integration: esp32_aibox_media_controller
      domain: media_player
  fields:
    video_id:
      required: true
      selector:
        text:

play_zing:
  name: Play Zing MP3 by song id
  description: Play a Zing MP3 song by song_id (for example from last_music_search.items).
  target:
    entity:
      integration: esp32_aibox_media_controller
      domain: media_player
  fields:
    song_id:
      required: true
      selector:
        text:

wake_word_set_enabled:
  name: Wake word set enabled
  description: Enable or disable wake word detection.
  target:
    entity:
      integration: esp32_aibox_media_controller
      domain: media_player
  fields:
    enabled:
      required: true
      selector:
        boolean:

wake_word_get_enabled:
